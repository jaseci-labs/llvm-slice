[project]
name = "llvm-slice"
version = "0.1.0"
description = "Repackage official LLVM releases into per-platform, range-fetchable ZIP artifacts with dependency manifests (no rebuild)."
kind = "cli"
entry-point = "llvm_slice/cli.jac"
license = "MIT"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["llvm", "clang", "static-libraries", "packaging", "cmake", "jac", "jaclang"]
authors = [{ name = "Jason Mars", email = "jason@mars.ninja" }]

[project.urls]
repository = "https://github.com/jaseci-labs/llvm-slice"
homepage = "https://github.com/jaseci-labs/llvm-slice"
issues = "https://github.com/jaseci-labs/llvm-slice/issues"

# Only the importable client tool ships in the wheel; the maintenance scripts
# (scripts/) and the discover/repackage helpers (lib/) stay in the repo for CI
# and are not part of the published package. `jac bundle` collects the dirs
# named here, preserving their paths as import names.
[project.include]
packages = ["llvm_slice"]

# The whole toolchain is intentionally dependency-light: it uses only the Python
# standard library (urllib, zipfile, json, hashlib, subprocess) plus the system
# `tar`/`gh`. The Jac runtime itself is a host dependency -- provided by the
# `jac` binary (or a jaclang-enabled interpreter), not pulled from PyPI -- so it
# is deliberately absent here.
[dependencies]

# Installs the `llvm-slice` console command (pip maps [entrypoints.scripts] to
# console_scripts). The launcher calls llvm_slice.cli:main, which returns the
# process exit code.
[entrypoints.scripts]
llvm-slice = "llvm_slice.cli:main"

[run]
# Keep runs reproducible and quiet; the graph we build for dependency resolution
# is held off `root`, so nothing is persisted between runs.
cache = true

[check.lint]
select = ["default"]

[test]
directory = "."

# Convenience shortcuts. The CI workflows call `jac run ...` directly so they can
# pass per-invocation arguments; these are for local use.
[scripts]
discover = "jac run scripts/discover.jac"
repackage = "jac run scripts/repackage.jac"
build-index = "jac run scripts/build_index.jac"
slice = "jac run llvm_slice/cli.jac"
