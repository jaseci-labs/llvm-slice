name: CI

# Type-check and test the Jac toolchain on every push and PR.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  JACLANG_VERSION: "0.16.7"

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "jaclang==${JACLANG_VERSION}"
      - run: jac --version
      - name: Type-check entry points
        run: |
          set -euo pipefail
          jac check llvm_slice/cli.jac
          jac check scripts/discover.jac
          jac check scripts/repackage.jac
          jac check scripts/build_index.jac
      - name: Run tests
        run: |
          set -euo pipefail
          for m in lib/classify.jac lib/cmake_parse.jac \
                   llvm_slice/resolve.jac llvm_slice/rangezip.jac; do
            echo "== jac test $m =="
            jac test "$m"
          done
